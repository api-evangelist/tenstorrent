aid: tenstorrent
name: Tenstorrent
description: >-
  Tenstorrent is an AI hardware company designing Tensix and Tensix++ based
  AI accelerators on the open RISC-V architecture, including the Wormhole
  and Blackhole generations of cards, the TT-QuietBox workstation, and the
  Galaxy Blackhole 6U server housing 32 Blackhole chips. The company is
  unusual in the AI silicon space for shipping a fully open-source software
  stack including TT-Metal (the low-level kernel and operator library),
  TT-Forge (an MLIR-based compiler for PyTorch, JAX, and ONNX), TT-MLIR,
  TT-XLA, the TT-Inference-Server, and RISC-V cores and toolchains. Pricing
  is published from 999 dollars for an entry card up to 440,000 dollars for
  a base Galaxy supercluster. Tenstorrent does not currently offer a public
  hosted-inference API, so this profile catalogs hardware, SDKs, compilers,
  and open-source repositories rather than an HTTP API surface.
